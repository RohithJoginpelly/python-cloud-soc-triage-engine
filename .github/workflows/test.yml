name: SOC Pipeline Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest -v

      - name: Replay sample CloudTrail logs
        run: |
          python src/main.py

      - name: Generate incident reports
        run: |
          PYTHONPATH=src python src/report_generator.py

      - name: Validate alert outputs
        run: |
          python scripts/validate_alert_outputs.py
